name: Bump Version

on:
  push:
    branches:
      - master

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'chore: bump version')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in index.html
        run: |
          CURRENT=$(grep -oP 'v \d+\.\K\d+' index.html | head -1)
          MAJOR=$(grep -oP 'v \K\d+(?=\.\d+)' index.html | head -1)
          NEW=$((CURRENT + 1))
          sed -i "s/v ${MAJOR}\.${CURRENT}/v ${MAJOR}.${NEW}/g" index.html
          echo "Bumped version: v ${MAJOR}.${CURRENT} → v ${MAJOR}.${NEW}"

      - name: Commit and push
        run: |
          VERSION=$(grep -oP 'v \d+\.\d+' index.html | head -1)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git push
